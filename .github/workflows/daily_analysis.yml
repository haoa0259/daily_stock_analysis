name: 每日股票分析

on:
  # 定时触发 - 周一至周五交易日
  schedule:
    - cron: '0 0 * * 1-5'      # 北京时间 08:00 早安问候
    - cron: '30 0 * * 1-5'     # 北京时间 08:30 早盘资讯
    - cron: '25 1 * * 1-5'     # 北京时间 09:25 集合竞价推荐
    - cron: '30 3 * * 1-5'     # 北京时间 11:30 早盘点评
    - cron: '45 6 * * 1-5'     # 北京时间 14:45 尾盘推荐
    - cron: '0 7 * * 1-5'      # 北京时间 15:00 收盘点评
    - cron: '0 15 * * 1-5'     # 北京时间 23:00 晚安问候

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盘）
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))
      
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # AI 配置
          GEMINI_API_KEY: AIzaSyDAgrscQpc0PT72B664iY9pftnZxS0TyMQ
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_MODEL_FALLBACK: gemini-2.5-flash
          GEMINI_REQUEST_DELAY: '3.0'

          # 通知渠道 - Telegram（你的机器人+群）
          TELEGRAM_BOT_TOKEN: 8759872051:AAEtPVCsQq-uNtrOkOfGhb3baXOapNzr91w
          TELEGRAM_CHAT_ID: -1003728062886
          TELEGRAM_MESSAGE_THREAD_ID: ''

          # 自选股（可在这里直接修改，逗号分隔，不加空格）
          STOCK_LIST: '600519,600036,601318,601288,601988,601398,600030,600104,600000,600887,600900,600016,601166,601328,601818,601006,600028,601857,600109,601601,601628,600795,600837,600050,600111,600276,600309,600406,600547,600585,600703,600704,600745,600809,601012,601138,601231,601360,601633,601688,601766,601888,601919,603259,603288,603501,603986,600089,600176,600208,600221,600298,600352,600438,600460,600498,600516,600522,600570,600588,600606,600660,600674,600779,600848,600871,600886,601009,601117,601155,601198,601211,601319,601555,601618,601727,601800,601868,601901,601998,603000,603160,603290,603659,603799,603899,603993,000001,000002,000063,000157,000166,000333,000408,000538,000568,000591,000625,000651,000661,000725,000776,000858,000874,000895,000938,000977,001289,002027,002049,002050,002129,002142,002230,002241,002271,002304,002311,002352,002371,002410,002456,002475,002555,002558,002594,002602,002607,002624,002714,002736,002739,002821,002841,002916,002939,300015,300033,300059,300122,300124,300136,300144,300251,300274,300347,300408,300498,300676,300750,300760,300832,300866,300888,300957,301071'
          MARKET_REVIEW_REGION: cn
          
          # 运行配置
          REPORT_TYPE: simple
          SINGLE_STOCK_NOTIFY: 'false'
          MARKET_REVIEW_ENABLED: 'true'
          ANALYSIS_DELAY: '0'
          TRADING_DAY_CHECK_ENABLED: 'true'
          
          # 系统配置
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance,akshare_em'
          
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          echo "📝 报告类型: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 配置检查"
          echo "=========================================="
          echo "【AI 配置】"
          echo "  Gemini API Key: ✅ 已配置"
          echo ""
          echo "【通知渠道】"
          echo "  Telegram: ✅ 已配置"
          echo "=========================================="
          echo ""
          
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 已启用强制运行模式（跳过交易日检查）"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: 上传分析报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 最近日志（最后 30 行）:"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "无日志"
          fi 